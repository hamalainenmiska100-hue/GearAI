<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gear AI Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="chat-screen" aria-label="Chat screen">
      <div class="logo-pill" aria-label="Gear logo">
        <img src="gear-logo.svg" alt="Gear logo" class="logo" />
      </div>

      <form class="composer" aria-label="Message composer">
        <label for="prompt" class="sr-only">Input text to send</label>
        <input id="prompt" type="text" placeholder="input text to send" />
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
